<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker | Sign In</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind & DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="bg-[#F8FAFC] flow-root min-h-screen">
    <section
      class="w-full max-w-[520px] mx-auto my-10 bg-white px-8 py-6 shadow-md rounded-lg"
    >
      <div class="flex flex-col items-center">
        <img src="./assets/github-logo.png" alt="" />
        <h2 class="mt-3 mb-1 text-[#1F2937] text-2xl font-semibold">
          GitHub Issues Tracker
        </h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
      </div>
      <div class="">
        <fieldset class="p-4">
          <label class="label text-[#1F2937] font-medium mb-2">Username</label>
          <input
            id="username"
            type="text"
            class="input w-full rounded-lg mb-1"
            placeholder="Enter Username"
          />
          <p class="text-[#4A00FF] text-sm mb-3">Default: admin</p>

          <label class="label text-[#1F2937] font-medium mb-2">Password</label>
          <input
            id="password"
            type="password"
            class="input w-full rounded-lg mb-1"
            placeholder="Enter Password"
          />
          <p class="text-[#4A00FF] text-sm mb-3">Default: admin123</p>

          <button id="sign-in-btn" class="btn btn-primary rounded-lg w-full">
            Sign In
          </button>
        </fieldset>
      </div>
      <div class="flex items-center">
        <div class="grow border-t border-[#E4E4E7]"></div>

        <span class="mx-2 text-[#1F2937]">OR</span>

        <div class="grow border-t border-[#E4E4E7]"></div>
      </div>
      <div>
        <p class="text-center text-[#64748B] text-sm mb-1">Demo Credentials:</p>
        <div
          class="bg-[#F8FAFC] flex flex-col justify-center items-center rounded-lg py-4 text-[#1F2937]"
        >
          <p><span class="font-semibold">Username:</span> admin</p>
          <p><span class="font-semibold">Password:</span> admin123</p>
        </div>
      </div>
    </section>
    <script src="./scripts/index.js"></script>
  </body>
</html>
