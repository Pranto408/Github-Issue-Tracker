<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker | Sign In</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind & DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css" />
    <!-- Font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body class="bg-[#F8FAFC] flow-root min-h-screen">
    <header>
      <div class="navbar bg-base-100 shadow-sm px-10 flex flex-col gap-4 md:flex-row mb-15">
        <div class="flex gap-2 items-center flex-1">
          <img class="w-9" src="./assets/github-logo.png" alt="" />
          <h2 class="text-[#1F2937] font-semibold text-2xl">
            GitHub Issues Tracker
          </h2>
        </div>
        <div class="flex gap-3 ">
          <div>
            <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search issues..." />
          </label>
          </div>
          <button class="btn btn-primary rounded">Search</button>
        </div>
      </div>
    </header>

    <section>
      <div id="btn-container" class="w-1110/1600 mx-auto bg-white p-6 rounded-lg shadow flex gap-2 flex-col items-center md:flex-row md:items-start">
        <button id="all-btn" class="btn w-30 bg-[#4A00FF] text-white">All</button>
        <button id="open-btn" class="btn w-30">Open</button>
        <button id="closed-btn" class="btn w-30">Closed</button>
      </div>
    </section>
    <script src="./scripts/home.js"></script>
  </body>
</html>
